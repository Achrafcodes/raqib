<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raqib — Freelancer CRM</title>
    <meta name="description" content="Raqib is the CRM built for solo freelancers. Track clients, projects, invoices, and follow-ups — all in one dark, distraction-free dashboard." />
    <meta name="theme-color" content="#0C0E14" />
    <link rel="canonical" href="https://raqib-one.vercel.app/" />

    <meta property="og:type" content="website" />

    <meta property="og:title" content="Raqib — Freelancer CRM" />

    <meta property="og:url" content="https://raqib-one.vercel.app/" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Raqib — Freelancer CRM" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      html, body, #root { background-color: #0C0E14; }

  <body>
    <script>(function(){var t=localStorage.getItem('raqib-theme')||'dark';document.documentElement.className=t==='light'?'light':'dark';}());</script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
